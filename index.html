<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag khusus untuk mencegah zoom otomatis di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ular Tangga Ceria 2D - Mobile HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            background: radial-gradient(circle, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Mencegah scroll yang tidak diinginkan di mobile */
            overflow: hidden;
            color: #0369a1;
            touch-action: manipulation;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .interactive { pointer-events: auto; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border: 2px solid #7dd3fc;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(12, 74, 110, 0.15);
        }

        .btn-game {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 rgba(2, 132, 199, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.5);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .btn-game:active:not(:disabled) { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 rgba(2, 132, 199, 0.4); 
        }

        canvas {
            background: #ffffff;
            border: 6px solid #0284c7;
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(12, 74, 110, 0.4);
            /* Ukuran dinamis untuk berbagai jenis layar HP */
            width: 92vw;
            height: 92vw;
            max-width: 80vh;
            max-height: 80vh;
            display: block;
        }

        /* Perbaikan input di mobile agar tidak zoom otomatis */
        input { font-size: 16px !important; }

        .full-screen-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #f0f9ff 0%, #bae6fd 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        @keyframes turn-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0px rgba(14, 165, 233, 0); }
            50% { transform: scale(1.05); box-shadow: 0 0 10px rgba(14, 165, 233, 0.3); }
        }

        .active-turn-pulse {
            animation: turn-pulse 2s ease-in-out infinite;
        }

        /* Responsivitas HUD untuk HP Layar Kecil */
        @media (max-width: 640px) {
            .turn-panel { top: 10px; left: 10px; padding: 10px; }
            .score-panel { top: 10px; right: 10px; padding: 10px; min-width: 100px; }
            .dice-area { bottom: 15px; gap: 10px; }
            #dice-result { width: 70px; height: 70px; font-size: 2.5rem !important; border-radius: 20px; border-width: 4px; }
            #roll-btn { padding: 12px 30px; font-size: 1.5rem !important; border-radius: 20px; }
            h1 { font-size: 2.8rem !important; }
            .bidak-label { font-size: 18px !important; }
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <!-- Menu Utama -->
    <div id="lobby-menu" class="full-screen-overlay interactive">
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-5xl md:text-8xl font-black text-sky-600 drop-shadow-xl">
                Ular Tangga <span class="text-orange-500">Ceria</span>
            </h1>
            <p class="text-sky-500 text-lg md:text-2xl font-bold px-4">Visual HD & Ramah HP!</p>
        </div>
        
        <div id="main-actions" class="space-y-4 w-full max-w-xs md:max-w-md">
            <input type="text" id="username-input" class="w-full p-4 rounded-2xl bg-white border-4 border-sky-100 text-sky-900 text-center outline-none focus:border-orange-400 transition-all text-lg font-bold shadow-inner" placeholder="Nama Kamu" maxlength="12">
            
            <button id="create-room-btn" onclick="createRoom()" class="btn-game w-full bg-sky-500 text-white py-4 rounded-2xl font-black text-xl">BUAT SERVER</button>
            <div class="flex gap-2">
                <input type="text" id="join-id-input" class="flex-1 p-4 rounded-2xl bg-white border-4 border-sky-100 text-sky-900 text-center outline-none uppercase font-black tracking-widest" placeholder="KODE">
                <button id="join-room-btn" onclick="joinRoom()" class="btn-game bg-orange-500 text-white px-6 rounded-2xl font-black text-lg">GABUNG</button>
            </div>
            <p id="status-msg" class="text-sm text-sky-400 font-bold text-center"></p>
        </div>

        <div id="waiting-area" class="hidden text-center space-y-6 w-full max-w-sm">
            <div class="glass-panel p-6 bg-white/95">
                <p class="text-[10px] text-sky-400 font-black uppercase tracking-[0.2em] mb-1">Kode Room</p>
                <h2 id="display-room-id" class="text-5xl font-black text-sky-600 font-mono">-----</h2>
            </div>
            <div class="space-y-2">
                <p class="font-black text-sky-700">Pemain di Room:</p>
                <div id="player-list" class="flex flex-wrap justify-center gap-2"></div>
            </div>
            <button id="start-btn" onclick="startGame()" class="btn-game bg-emerald-500 text-white w-full py-4 rounded-2xl font-black text-xl hidden">MULAI!</button>
        </div>
    </div>

    <!-- HUD Permainan -->
    <div id="game-hud" class="hidden">
        <div class="turn-panel absolute top-4 left-4 glass-panel px-4 py-3 text-sky-900 interactive flex items-center gap-3">
            <div id="turn-color" class="w-10 h-10 rounded-xl border-4 border-white active-turn-pulse shadow-md"></div>
            <div>
                <p class="text-[8px] uppercase font-black text-sky-400 tracking-wider">Giliran</p>
                <p id="turn-name" class="font-black text-sm md:text-lg leading-none">...</p>
            </div>
        </div>

        <div class="score-panel absolute top-4 right-4 glass-panel p-3 text-sky-900 min-w-[110px]">
            <h3 class="text-[8px] font-black text-sky-400 uppercase text-center mb-2 tracking-wider">Skor</h3>
            <div id="player-scores" class="space-y-1.5"></div>
        </div>

        <div class="dice-area absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4 interactive w-full">
            <div id="dice-result" class="text-5xl md:text-8xl bg-white w-20 h-20 md:w-32 md:h-32 rounded-3xl shadow-2xl flex items-center justify-center text-sky-900 font-black border-4 border-sky-50 transition-all">
                🎲
            </div>
            <button id="roll-btn" onclick="handleRoll()" class="btn-game bg-gradient-to-b from-orange-400 to-orange-600 text-white px-12 py-4 rounded-2xl text-2xl font-black disabled:opacity-50 disabled:shadow-none">
                KOCOK!
            </button>
        </div>
    </div>

    <!-- Layar Menang -->
    <div id="win-screen" class="full-screen-overlay hidden interactive text-center">
        <div class="text-8xl mb-4">👑</div>
        <h2 class="text-5xl font-black text-orange-500 mb-2">JUARA!</h2>
        <p id="winner-display" class="text-lg font-bold text-sky-700 mb-8 max-w-[250px]"></p>
        <button onclick="location.reload()" class="btn-game bg-sky-600 text-white px-12 py-4 rounded-xl font-black text-xl">MAIN LAGI</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'ular-tangga-mobile-hd-v1';

    const PORTALS = { 
        2: 38, 4: 14, 9: 31, 33: 85, 52: 88, 80: 99, // Tangga
        17: 7, 54: 34, 62: 19, 64: 60, 87: 24, 93: 73, 95: 75, 98: 79 // Ular
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const BOARD_SIZE = 1200; 
    const TILE_SIZE = BOARD_SIZE / 10;
    canvas.width = BOARD_SIZE;
    canvas.height = BOARD_SIZE;

    let roomID = "";
    let myUID = "";
    let myName = "Pemain";
    let roomData = null;
    let animatedPositions = {}; 
    let isAnimating = false;
    let isAuthReady = false;

    function getTileCoords(pos) {
        if (pos < 1) pos = 1;
        if (pos > 100) pos = 100;
        const gridPos = pos - 1;
        const row = Math.floor(gridPos / 10);
        let col = gridPos % 10;
        if (row % 2 !== 0) col = 9 - col;
        return {
            x: col * TILE_SIZE + TILE_SIZE / 2,
            y: BOARD_SIZE - (row * TILE_SIZE + TILE_SIZE / 2)
        };
    }

    function drawBoard() {
        ctx.clearRect(0, 0, BOARD_SIZE, BOARD_SIZE);
        
        for (let i = 1; i <= 100; i++) {
            const coords = getTileCoords(i);
            const x = coords.x - TILE_SIZE / 2;
            const y = coords.y - TILE_SIZE / 2;
            
            const isAlt = i % 2 === 0;
            ctx.fillStyle = isAlt ? '#f8fafc' : '#ffffff';
            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
            
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
            
            ctx.fillStyle = isAlt ? '#94a3b8' : '#cbd5e1';
            ctx.font = '700 32px Fredoka';
            ctx.textAlign = 'center';
            ctx.fillText(i, x + TILE_SIZE/2, y + TILE_SIZE/2 + 12);
        }

        Object.entries(PORTALS).forEach(([start, end]) => {
            const s = getTileCoords(parseInt(start));
            const e = getTileCoords(parseInt(end));
            const isLadder = parseInt(end) > parseInt(start);
            if (isLadder) drawLadder(s, e);
            else drawSnake(s, e);
        });

        if (roomData && roomData.players) {
            roomData.players.forEach(p => {
                const pos = animatedPositions[p.uid] || getTileCoords(p.position);
                
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.ellipse(pos.x, pos.y + 20, 25, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 38, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 8;
                ctx.stroke();

                ctx.fillStyle = '#1e293b';
                ctx.font = '800 28px Fredoka';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, pos.x, pos.y - 60);
            });
        }
    }

    function drawLadder(s, e) {
        ctx.save();
        ctx.strokeStyle = '#854d0e';
        ctx.lineWidth = 18;
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(s.x - 25, s.y); ctx.lineTo(e.x - 25, e.y);
        ctx.moveTo(s.x + 25, s.y); ctx.lineTo(e.x + 25, e.y);
        ctx.stroke();
        ctx.lineWidth = 8;
        const steps = 6;
        for(let i=1; i<steps; i++) {
            const t = i/steps;
            const px = s.x + (e.x - s.x) * t;
            const py = s.y + (e.y - s.y) * t;
            ctx.beginPath();
            ctx.moveTo(px - 35, py); ctx.lineTo(px + 35, py);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawSnake(s, e) {
        ctx.save();
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 22;
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        const midX = (s.x + e.x) / 2;
        ctx.bezierCurveTo(midX + 150, s.y, midX - 150, e.y, e.x, e.y);
        ctx.stroke();
        ctx.fillStyle = '#ef4444';
        ctx.beginPath(); ctx.arc(s.x, s.y, 20, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    async function initAuth() {
        const statusMsg = document.getElementById('status-msg');
        statusMsg.innerText = "Menghubungkan...";
        
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (e) {
            console.error(e);
            statusMsg.innerText = "Gagal menghubungkan. Periksa koneksi.";
        }

        onAuthStateChanged(auth, u => { 
            if(u) {
                myUID = u.uid; 
                isAuthReady = true;
                statusMsg.innerText = "Siap bermain!";
            }
        });
    }

    window.createRoom = async () => {
        if (!isAuthReady) return;
        const nameInput = document.getElementById('username-input');
        const nameVal = nameInput.value.trim();
        if(!nameVal) {
            nameInput.classList.add('border-red-400');
            setTimeout(() => nameInput.classList.remove('border-red-400'), 1000);
            return;
        }
        
        document.getElementById('status-msg').innerText = "Membuat room...";
        myName = nameVal;
        roomID = Math.random().toString(36).substring(2, 7).toUpperCase();
        
        try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomID), {
                status: 'waiting', host: myUID,
                players: [{ uid: myUID, name: myName, position: 1, color: '#0ea5e9' }],
                turnIndex: 0, lastRoll: 0, winner: null
            });
            setupLobbyListener();
        } catch (e) {
            console.error(e);
            document.getElementById('status-msg').innerText = "Gagal membuat room.";
        }
    };

    window.joinRoom = async () => {
        if (!isAuthReady) return;
        const idInput = document.getElementById('join-id-input');
        const id = idInput.value.trim().toUpperCase();
        const nameVal = document.getElementById('username-input').value.trim();
        if(!id || !nameVal) return;
        
        document.getElementById('status-msg').innerText = "Mencari room...";
        myName = nameVal;
        const ref = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
        
        try {
            const snap = await getDoc(ref);
            if(!snap.exists()) {
                document.getElementById('status-msg').innerText = "Room tidak ditemukan!";
                return;
            }
            const data = snap.data();
            if (data.status !== 'waiting') {
                document.getElementById('status-msg').innerText = "Game sudah dimulai!";
                return;
            }
            
            const ps = data.players;
            // Hindari double join jika reload
            if (!ps.find(p => p.uid === myUID)) {
                const colors = ['#0ea5e9', '#f59e0b', '#10b981', '#ec4899', '#8b5cf6'];
                ps.push({ uid: myUID, name: myName, position: 1, color: colors[ps.length] || '#334155' });
                await updateDoc(ref, { players: ps });
            }
            
            roomID = id;
            setupLobbyListener();
        } catch (e) {
            console.error(e);
            document.getElementById('status-msg').innerText = "Gagal bergabung.";
        }
    };

    function setupLobbyListener() {
        document.getElementById('main-actions').classList.add('hidden');
        document.getElementById('waiting-area').classList.remove('hidden');
        document.getElementById('display-room-id').innerText = roomID;
        
        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomID), snap => {
            const data = snap.data();
            if(!data) return;
            const old = roomData;
            roomData = data;
            
            document.getElementById('player-list').innerHTML = data.players.map(p => `
                <div class="px-3 py-2 bg-white rounded-xl font-bold text-sky-800 flex items-center gap-2 border-2 border-sky-50 shadow-sm text-sm">
                    <div class="w-3 h-3 rounded-full" style="background:${p.color}"></div>
                    ${p.name} ${p.uid === myUID ? '(Kamu)' : ''}
                </div>
            `).join('');
            
            if(data.host === myUID) document.getElementById('start-btn').classList.remove('hidden');
            
            if(data.status === 'playing') {
                document.getElementById('lobby-menu').classList.add('hidden');
                document.getElementById('game-hud').classList.remove('hidden');
                
                const cur = data.players[data.turnIndex];
                document.getElementById('turn-name').innerText = cur.uid === myUID ? "GILIRANMU!" : cur.name;
                document.getElementById('turn-color').style.backgroundColor = cur.color;
                document.getElementById('roll-btn').disabled = cur.uid !== myUID || isAnimating || data.winner;
                
                if(data.lastRoll) document.getElementById('dice-result').innerText = data.lastRoll;

                document.getElementById('player-scores').innerHTML = data.players.map(p => `
                    <div class="flex items-center gap-2 bg-white p-1.5 rounded-lg border border-sky-50 text-[10px]">
                        <div class="w-2.5 h-2.5 rounded-full" style="background:${p.color}"></div>
                        <span class="font-bold flex-1 truncate">${p.name}</span>
                        <span class="text-sky-600 font-black">#${p.position}</span>
                    </div>
                `).join('');

                data.players.forEach((p, i) => {
                    if (old && old.players[i].position !== p.position) {
                        animateMoveSequence(p.uid, old.players[i].position, p.position, data.lastRoll);
                    } else if (!animatedPositions[p.uid]) {
                        animatedPositions[p.uid] = getTileCoords(p.position);
                    }
                });

                if(data.winner) {
                    document.getElementById('winner-display').innerText = data.winner + " Menang!";
                    document.getElementById('win-screen').classList.remove('hidden');
                }
            }
        }, err => {
            console.error("Listener error:", err);
        });
    }

    window.startGame = async () => {
        try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomID), { status: 'playing' });
        } catch (e) {
            console.error(e);
        }
    };

    async function animateMoveSequence(uid, from, to, roll) {
        if (isAnimating) return;
        isAnimating = true;
        const targetFromDice = Math.min(100, from + roll);
        
        if (from + roll <= 100) {
            for (let i = from + 1; i <= targetFromDice; i++) await jumpTo(uid, i);
        }
        
        if (targetFromDice !== to) {
            await new Promise(r => setTimeout(r, 600));
            await slideTo(uid, to);
        }
        
        isAnimating = false;
        if (roomData) {
            const cur = roomData.players[roomData.turnIndex];
            document.getElementById('roll-btn').disabled = cur.uid !== myUID || roomData.winner;
        }
    }

    function jumpTo(uid, tileNum) {
        return new Promise(resolve => {
            const start = animatedPositions[uid] || getTileCoords(tileNum - 1);
            const target = getTileCoords(tileNum);
            let frame = 0;
            const totalFrames = 12; 
            function step() {
                frame++;
                const t = frame / totalFrames;
                const h = 80;
                animatedPositions[uid] = {
                    x: start.x + (target.x - start.x) * t,
                    y: (start.y + (target.y - start.y) * t) - Math.sin(t * Math.PI) * h
                };
                if (frame < totalFrames) requestAnimationFrame(step);
                else { animatedPositions[uid] = target; resolve(); }
            }
            step();
        });
    }

    function slideTo(uid, tileNum) {
        return new Promise(resolve => {
            const start = animatedPositions[uid];
            const target = getTileCoords(tileNum);
            let frame = 0;
            const totalFrames = 40; 
            function step() {
                frame++;
                const t = frame / totalFrames;
                const ease = t * (2 - t);
                animatedPositions[uid] = {
                    x: start.x + (target.x - start.x) * ease,
                    y: start.y + (target.y - start.y) * ease
                };
                if (frame < totalFrames) requestAnimationFrame(step);
                else { animatedPositions[uid] = target; resolve(); }
            }
            step();
        });
    }

    window.handleRoll = async () => {
        if(isAnimating || !roomData) return;
        const roll = Math.floor(Math.random() * 6) + 1;
        const idx = roomData.turnIndex;
        let nextPos = roomData.players[idx].position + roll;
        if(nextPos > 100) nextPos = roomData.players[idx].position; 
        const finalPos = PORTALS[nextPos] || nextPos;
        const ps = [...roomData.players];
        ps[idx].position = finalPos;
        
        try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomID), {
                players: ps, turnIndex: (idx + 1) % ps.length, lastRoll: roll,
                winner: finalPos === 100 ? ps[idx].name : null
            });
        } catch (e) {
            console.error(e);
        }
    };

    function gameLoop() { drawBoard(); requestAnimationFrame(gameLoop); }
    window.onload = () => { 
        initAuth(); 
        gameLoop(); 
    };
</script>
</body>
</html>
